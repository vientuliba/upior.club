<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="authand on GitHub.">
    <meta name="theme-color" content="#dfc0c3">
    <meta name="color-scheme" content="light">
    <title>authand</title>
    <style>
      :root {
        --pink: #dfc0c3;
        --white: #f8f5ee;
        --ink: #171213;
        --line: rgba(23, 18, 19, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--pink);
      }

      body {
        --cell: 46px;
        --band: calc(var(--cell) * 2);

        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: var(--ink);
        font: 500 16px/1 ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        background:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px),
          linear-gradient(
            to bottom,
            transparent 0 calc(50% - var(--band) / 2),
            var(--white) 0 calc(50% + var(--band) / 2),
            transparent 0
          ),
          linear-gradient(
            to right,
            var(--pink) 0 calc(50% - var(--band) / 2),
            var(--white) 0 calc(50% + var(--band) / 2),
            var(--pink) 0
          );
        background-position:
          calc(50% + var(--cell) / 2) calc(50% + var(--cell) / 2),
          calc(50% + var(--cell) / 2) calc(50% + var(--cell) / 2),
          0 0,
          0 0;
        background-size:
          var(--cell) var(--cell),
          var(--cell) var(--cell),
          100% 100%,
          100% 100%;
      }

      main {
        position: relative;
        z-index: 1;
        padding: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        color: var(--ink);
        text-decoration: none;
        letter-spacing: 0;
        text-transform: lowercase;
        filter: drop-shadow(0 1px 0 rgba(248, 245, 238, 0.38));
      }

      a::before,
      a::after {
        color: rgba(23, 18, 19, 0.54);
        transition: transform 150ms ease, color 150ms ease;
      }

      a::before {
        content: "[";
        margin-right: 0.38em;
      }

      a::after {
        content: "]";
        margin-left: 0.38em;
      }

      a:hover,
      a:focus-visible {
        color: #000;
      }

      a:hover::before,
      a:focus-visible::before {
        color: #000;
        transform: translateX(-3px);
      }

      a:hover::after,
      a:focus-visible::after {
        color: #000;
        transform: translateX(3px);
      }

      a:focus-visible {
        outline: 1px solid currentColor;
        outline-offset: 7px;
      }

      ::selection {
        color: var(--white);
        background: var(--ink);
      }

      @media (max-width: 520px) {
        body {
          --cell: 34px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a href="https://github.com/authand" rel="me">github.com/authand</a>
    </main>
  </body>
</html>
