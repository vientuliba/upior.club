<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="slimiba.">
    <meta name="theme-color" content="#f6f4ee">
    <meta name="color-scheme" content="light">
    <link rel="preload" href="share-tech-mono.woff2" as="font" type="font/woff2" crossorigin>
    <title>slimiba</title>
    <style>
      @font-face {
        font-family: "Share Tech Mono";
        src: url("share-tech-mono.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --paper: #f6f4ee;
        --paper-deep: #ebe8df;
        --ink: #19181d;
        --ink-soft: #302c35;
        --violet: #433557;
        --violet-soft: #d7d0dc;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--paper);
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        color: var(--ink);
        font: 400 16px/1.5 "Share Tech Mono", ui-monospace, "SFMono-Regular", Consolas, monospace;
        background:
          linear-gradient(135deg, rgba(67, 53, 87, 0.11), transparent 40%),
          linear-gradient(315deg, rgba(25, 24, 29, 0.055), transparent 36%),
          var(--paper);
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .profile {
        width: min(100%, 430px);
        display: grid;
        gap: 24px;
        justify-items: start;
      }

      .avatar {
        width: 112px;
        height: 148px;
        display: block;
        overflow: hidden;
        border: 1px solid rgba(25, 24, 29, 0.18);
        border-radius: 6px;
        background: var(--paper-deep);
      }

      .avatar img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: 50% 48%;
      }

      .copy {
        display: grid;
        gap: 10px;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-size: 72px;
        font-weight: 400;
        line-height: 0.92;
        letter-spacing: 0;
      }

      a {
        width: fit-content;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        font-size: 15px;
        color: var(--violet);
        font-weight: 400;
        text-decoration: none;
        transition:
          color 160ms ease,
          transform 160ms ease;
      }

      a::before,
      a::after {
        color: rgba(67, 53, 87, 0.5);
        transition:
          color 160ms ease,
          transform 160ms ease;
      }

      a::before {
        content: "[";
        margin-right: 0.42em;
      }

      a::after {
        content: "]";
        margin-left: 0.42em;
      }

      a:hover,
      a:focus-visible {
        color: var(--ink-soft);
        transform: translateY(-1px);
      }

      a:hover::before,
      a:focus-visible::before {
        color: var(--ink-soft);
        transform: translateX(-2px);
      }

      a:hover::after,
      a:focus-visible::after {
        color: var(--ink-soft);
        transform: translateX(2px);
      }

      a:focus-visible {
        outline: 2px solid var(--violet-soft);
        outline-offset: 6px;
      }

      ::selection {
        color: var(--paper);
        background: var(--violet);
      }

      @media (max-width: 620px) {
        main {
          padding: 24px;
        }

        .profile {
          gap: 20px;
        }

        .avatar {
          width: 86px;
          height: 114px;
        }

        h1 {
          font-size: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="profile" aria-label="slimiba">
        <picture class="avatar">
          <img src="profile.jpg" width="112" height="148" alt="">
        </picture>
        <div class="copy">
          <h1>slimiba</h1>
          <a href="https://github.com/vientuliba" rel="me">github.com/vientuliba</a>
        </div>
      </section>
    </main>
  </body>
</html>
